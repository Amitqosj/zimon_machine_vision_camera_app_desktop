# Render Blueprint — adjust service names and env in the dashboard after connect.
# New → Blueprint → select repo → apply. Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: zimon-api
    runtime: python
    region: oregon
    plan: free
    # Root Directory = repo root (.)
    rootDir: .
    buildCommand: pip install -r backend/requirements-render.txt
    startCommand: bash scripts/run-api-render.sh
    #
    # If Root Directory = `backend` instead, use:
    #   buildCommand: pip install -r requirements-render.txt
    #   startCommand: bash start-render.sh
    # (Plain `uvicorn backend.api.main:app` fails: cwd is inside `backend/`, so `import backend` breaks.)
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.8"
      - key: ZIMON_DISABLE_QT
        value: "1"
      - key: ZIMON_JWT_SECRET
        generateValue: true
      - key: ZIMON_CORS_ORIGINS
        value: https://zimon-machine-vision-camera.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      # Optional: SQLite on a Render Disk mount, e.g. mount at /data
      # - key: ZIMON_DATABASE_PATH
      #   value: /data/zimon_app.db

  - type: web
    name: zimon-frontend
    runtime: static
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://zimon-machine-vision-camera-backend.onrender.com
